/* ── Shared Hook ── */
function useInView(threshold = 0.15) {
  const ref = useRef(null);
  const [visible, setVisible] = useState(false);
  useEffect(() => {
    const el = ref.current;
    if (!el) return;
    const obs = new IntersectionObserver(([e]) => { if (e.isIntersecting) { setVisible(true); obs.disconnect(); } }, { threshold });
    obs.observe(el);
    return () => obs.disconnect();
  }, [threshold]);
  return [ref, visible];
}

function NavBar({ activeSection }) {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {

    window.addEventListener("scroll", h);
    return () => window.removeEventListener("scroll", h);
  }, []);
  const scroll = (id) => document.getElementById(id)?.scrollIntoView({ behavior: "smooth" });
  const navItems = [
    { id: "hero", label: "Home" },
    { id: "strategy", label: "Strategy" },

    <nav style={{
      position: "fixed", top: 0, left: 0, right: 0, zIndex: 100,

            이후 호텔·리조트 마케팅 실무의 전략적 기반이 되었습니다.

        </div>

          <button onClick={() => setActiveCat("all")} style={{
            fontFamily: "'Outfit', sans-serif", fontSize: 12, padding: "8px 20px", borderRadius: 100, cursor: "pointer",
            background: activeCat === "all" ? COLORS.gold : "transparent", border: `1px solid ${activeCat === "all" ? COLORS.gold : COLORS.creamDark}`,
            color: activeCat === "all" ? COLORS.white : COLORS.textMuted, transition: "all 0.3s", fontWeight: 400,

          {categories.map((cat) => (

              background: activeCat === cat.id ? COLORS.gold : "transparent", border: `1px solid ${activeCat === cat.id ? COLORS.gold : COLORS.creamDark}`,

            }}>{cat.label}</button>
          ))}
        </div>
        {/* Active Category Description */}
        {activeCat !== "all" && (
          <p style={{ fontFamily: "'Noto Serif KR', serif", fontSize: 13, color: COLORS.textLight, lineHeight: 1.7, marginBottom: 32, maxWidth: 700 }}>
            {categories.find((c) => c.id === activeCat)?.description}
          </p>
        )}
        {/* Article Grid */}
        <div style={{ display: "grid", gridTemplateColumns: "repeat(3, 1fr)", gap: 20 }}>
          {filtered.map((article, i) => (
            <div key={article.id}
              onMouseEnter={() => setHoveredCard(article.id)}

                borderRadius: 12, overflow: "hidden", cursor: "pointer",
                opacity: visible ? 1 : 0, transform: visible ? "translateY(0)" : "translateY(20px)",
                transition: `all 0.5s cubic-bezier(0.4,0,0.2,1) ${i * 0.06}s`,
                boxShadow: hoveredCard === article.id ? "0 8px 32px rgba(0,0,0,0.15)" : "0 2px 8px rgba(0,0,0,0.05)",
              }}>
              {/* Card Image Area */}
              <div style={{
                height: 180, background: article.gradient, position: "relative", overflow: "hidden",
                display: "flex", alignItems: "flex-end", padding: 20,
              }}>
                <div style={{
                  position: "absolute", inset: 0,
                  background: hoveredCard === article.id ? "rgba(0,0,0,0.5)" : "rgba(0,0,0,0.2)",
                  transition: "background 0.4s",
                }} />
                <div style={{ position: "relative", zIndex: 1 }}>
                  <span style={{ fontFamily: "'Outfit', sans-serif", fontSize: 9, letterSpacing: "0.15em", color: "rgba(255,255,255,0.6)", textTransform: "uppercase" }}>

              <div style={{ background: COLORS.bgCard, padding: "20px 20px 24px" }}>

                <p style={{ fontFamily: "'Outfit', sans-serif", fontSize: 11, color: COLORS.textMuted, margin: "0 0 12px" }}>{article.subtitle}</p>
                {/* Marketer's Note on Hover */}

                }}>
                  <div style={{
                    fontFamily: "'Noto Serif KR', serif", fontSize: 11.5, color: COLORS.textLight, lineHeight: 1.7,
                    padding: "12px 0 0", borderTop: `1px solid ${COLORS.cream}`,

                    {article.commentary}
                  </div>
                </div>
              </div>
            </div>
          ))}
        </div>
      </div>
    </section>
  );
}

/* ══════════════════════════════════════════════════════
   APP
   ══════════════════════════════════════════════════════ */
function App() {
  const [activeSection, setActiveSection] = useState("hero");
  useEffect(() => {
    const sections = ["hero", "strategy", "career", "ai", "portfolio", "contact"];
    const handler = () => {
      for (let i = sections.length - 1; i >= 0; i--) {
        const el = document.getElementById(sections[i]);
        if (el && el.getBoundingClientRect().top < window.innerHeight * 0.4) { setActiveSection(sections[i]); break; }
      }
    };
    window.addEventListener("scroll", handler);
    return () => window.removeEventListener("scroll", handler);
  }, []);
  return (
    <div style={{ background: COLORS.bg }}>
      <style>{`
        @import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&family=Outfit:wght@200;300;400;500;600&family=Noto+Serif+KR:wght@200;300;400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        ::selection { background: #C4A265; color: #FFFCF8; }
      `}</style>
      <NavBar activeSection={activeSection} />
      <Hero />
      <BrandStrategy />
      <Career />
      <AICapability />
      <Portfolio />
      <Contact />
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
