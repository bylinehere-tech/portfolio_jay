const articles = [
  { id: 1, category: "identity", title: "LA 인터콘티넨탈 호텔", subtitle: "도시의 스카이라인을 품은 공간 브랜딩", commentary: "'도시 맥락을 공간에 내재화하는 전략'을 발견한 취재. 이후 그랜드하얏트 제주의 브랜드 아이덴티티 수립과 USP 메시지 가이드라인 설계에 직접 적용했습니다.", year: "2019", magazine: "Beyond", img: ARTICLE_IMAGES["LA_인터콘티넨털_호텔"], driveUrl: "https://drive.google.com/file/d/1xc0qKyLlbMo2iHAa1ZwJS7gjOJQU5nhy/view?usp=sharing" },
  { id: 2, category: "identity", title: "함부르크 폰테네이 호텔", subtitle: "자연과 건축이 대화하는 럭셔리의 새 문법", commentary: "유기적 곡선이 만드는 고객 동선의 미학. 제주신화월드 복합시설 브랜드 스탠다드 수립 시 '공간-브랜드 일관성' 원칙으로 발전시켰습니다.", year: "2018", magazine: "Beyond", img: ARTICLE_IMAGES["함부르크_폰테네이_호텔"], driveUrl: "https://drive.google.com/file/d/1i-O6kHn8hc2CYCqHFylvXNZs9811HbpM/view?usp=sharing" },
  { id: 3, category: "identity", title: "샌프란시스코 호텔 VIA", subtitle: "테크 시티의 부티크 호텔이 말하는 것", commentary: "기술과 호스피탈리티의 접점에서 브랜드 포지셔닝을 재정의하는 방식. 디지털 채널별 브랜드 커뮤니케이션 가이드 수립의 출발점이 된 취재입니다.", year: "2018", magazine: "Beyond", img: ARTICLE_IMAGES["샌프란시스코_호텔_VIA"], driveUrl: "https://drive.google.com/file/d/1qjm48uvD_guBxE9A9uozJqgEB2GonEfg/view?usp=sharing" },
  { id: 4, category: "identity", title: "벨기에 더 포스트 호텔", subtitle: "헤리티지를 리브랜딩하는 유럽의 방식", commentary: "역사적 자산을 현대적 브랜드 내러티브로 전환하는 과정. '전통과 현대의 결합'이라는 럭셔리 호텔의 브랜드 철학과 직결되는 인사이트를 얻은 취재입니다.", year: "2019", magazine: "Beyond", img: ARTICLE_IMAGES["벨기에_the_post_hotel"], driveUrl: "https://drive.google.com/file/d/1YeFss0hPrxfgKqJLB3prMncm0SXAkltW/view?usp=sharing" },
  { id: 5, category: "experience", title: "보스턴 더 휘트니 호텔", subtitle: "도시의 역사가 호텔의 정체성이 되는 순간", commentary: "도시 헤리티지를 호텔 브랜드에 내재화하는 방법론. 비컨 힐의 고풍스러운 문맥을 브랜드 경험으로 전환하는 과정이, 프로퍼티별 차별화 전략 설계의 참고가 되었습니다.", year: "2019", magazine: "Beyond", img: ARTICLE_IMAGES["보스톤_휘트니_hotel"], driveUrl: "https://drive.google.com/file/d/1fvANYP5dCdMUlgc8eoEm4ZWhmz9dlzbc/view?usp=sharing" },
  { id: 6, category: "experience", title: "빈 루비 호텔", subtitle: "린 럭셔리가 정의하는 새로운 가치", commentary: "'린 럭셔리' 전략 — 불필요를 덜어내 본질에 집중하는 접근. 타깃 세그먼트가 곧 브랜드 아이덴티티가 되는 구조를 체득한 취재로, 신규 브랜드 포지셔닝에 적용 가능한 프레임워크입니다.", year: "2018", magazine: "Beyond", img: ARTICLE_IMAGES["빈_루비_hotel"], driveUrl: "https://drive.google.com/file/d/1RXlmckxnozk5LHPIYlrOp18lu92CCI_U/view?usp=sharing" },
  { id: 7, category: "experience", title: "암스테르담 트웬티세븐", subtitle: "16개 스위트가 말하는 극한의 개인화", commentary: "소수의 객실로 극대화된 개인화 경험 설계. VIP 대상 고객 경험 가이드와 럭셔리 서비스 기준 수립에 직접 참고한 취재입니다.", year: "2018", magazine: "Beyond", img: ARTICLE_IMAGES["암스테르담_트웬티세븐_hotel"], driveUrl: "https://drive.google.com/file/d/1z-jgh3uf4h8HThcy42hM-1zQEydb7jg6/view?usp=sharing" },

function NavBar({ activeSection }) {
  const [scrolled, setScrolled] = useState(false);
  useEffect(() => {
    const h = () => setScrolled(window.scrollY > 60);
    window.addEventListener("scroll", h);
    return () => window.removeEventListener("scroll", h);
  }, []);
  const scroll = (id) => document.getElementById(id)?.scrollIntoView({ behavior: "smooth" });
  const navItems = [
    { id: "hero", label: "Home" },
    { id: "portfolio", label: "Editorial" },
    { id: "strategy", label: "Strategy" },
    { id: "career", label: "Career" },
    { id: "apply", label: "Apply" },
    { id: "contact", label: "Contact" },
  ];
  return (
    <nav style={{
      position: "fixed", top: 0, left: 0, right: 0, zIndex: 100,
      background: scrolled ? "rgba(26,22,18,0.95)" : "transparent",
      backdropFilter: scrolled ? "blur(20px)" : "none",
      transition: "all 0.5s cubic-bezier(0.4,0,0.2,1)",
      borderBottom: scrolled ? "1px solid rgba(196,162,101,0.15)" : "1px solid transparent",
    }}>
      <div style={{ maxWidth: 1200, margin: "0 auto", padding: "0 40px", display: "flex", justifyContent: "space-between", alignItems: "center", height: 70 }}>
        <div style={{ width: 40 }} />
        <div style={{ display: "flex", gap: 32 }}>
          {navItems.map((item) => (
            <button key={item.id} onClick={() => scroll(item.id)} style={{
              background: item.id === "apply" ? "rgba(196,162,101,0.12)" : "none",
              border: item.id === "apply" ? `1px solid rgba(196,162,101,0.3)` : "none",
              borderRadius: item.id === "apply" ? 100 : 0,
              cursor: "pointer",
              fontFamily: "'Outfit', sans-serif", fontSize: 12, fontWeight: item.id === "apply" ? 500 : 400, letterSpacing: "0.12em", textTransform: "uppercase",
              color: activeSection === item.id ? COLORS.gold : (scrolled ? "rgba(255,255,255,0.7)" : "rgba(255,255,255,0.8)"),
              transition: "all 0.3s", padding: item.id === "apply" ? "6px 18px" : "4px 0",
              borderBottom: item.id !== "apply" && activeSection === item.id ? `1px solid ${COLORS.gold}` : item.id !== "apply" ? "1px solid transparent" : "none",
            }}>{item.label}</button>
          ))}
        </div>
      </div>
    </nav>
  );
}

function App() {
  const [activeSection, setActiveSection] = useState("hero");
  useEffect(() => {
    const sections = ["hero", "portfolio", "strategy", "career", "apply", "contact"];
    const handler = () => {
      for (let i = sections.length - 1; i >= 0; i--) {
        const el = document.getElementById(sections[i]);
        if (el && el.getBoundingClientRect().top < window.innerHeight * 0.4) { setActiveSection(sections[i]); break; }
      }
    };
    window.addEventListener("scroll", handler);
    return () => window.removeEventListener("scroll", handler);
  }, []);
  return (
    <div style={{ background: COLORS.bg }}>
      <NavBar activeSection={activeSection} />
      <Hero />
      <Portfolio />
      <BrandStrategy />
      <Career />
      <Apply />
      <Contact />
    </div>
  );
}


ReactDOM.createRoot(document.getElementById("root")).render(<App />);
