<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문수진 Jay Moon — Marketing Director · Hospitality &amp; F&amp;B</title>
<meta name="description" content="호텔·F&B 마케팅 디렉터 문수진. 콘텐츠로 브랜드를 만들고, 경험으로 현장을 움직이고, 상품으로 매출을 만듭니다. 통합 마케팅 16년.">
<meta property="og:title" content="문수진 Jay Moon — Marketing Director · Hospitality &amp; F&amp;B">
<meta property="og:description" content="콘텐츠로 브랜드를 만들고, 경험으로 현장을 움직이고, 상품으로 매출을 만듭니다. 호텔·F&B 통합 마케팅 16년.">
<meta property="og:type" content="website">
<meta property="og:url" content="https://bylinehere-tech.github.io/portfolio_jay/">
<link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'%3E%3Crect width='64' height='64' fill='%23FFFFFF'/%3E%3Ctext x='32' y='44' font-family='Georgia,serif' font-size='36' font-weight='700' fill='%2320315F' text-anchor='middle'%3EM%3C/text%3E%3C/svg%3E">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+KR:wght@400;500;600;700&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
  /* 컬러 시스템: 화이트 베이스 + 딥 네이비 키컬러
     바이올렛 전환 시 --key, --key-lt, --dk 세 값만 교체 */
  :root{
    --bg:#FFFFFF; --bg2:#F3F5F8; --card:#F8F9FC;
    --ink:#181C26; --ink2:#333A4A;
    --key:#20315F; --key-lt:#93A5D6;
    --gray:#7E8494; --gray2:#4A5164;
    --line:#E4E7ED; --line2:#C8CEDC;
    --dk:#131C33; --dk-text:#EDF0F7; --dk-mut:#98A1B8; --dk-line:rgba(237,240,247,.14);
    --serif:'Noto Serif KR','Apple Myungjo',serif;
    --body:'Pretendard Variable',Pretendard,-apple-system,'Apple SD Gothic Neo','Noto Sans KR',sans-serif;
    --mono:'DM Mono','SF Mono',ui-monospace,monospace;
  }
  *{margin:0;padding:0;box-sizing:border-box}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--ink);font-family:var(--body);-webkit-font-smoothing:antialiased}
  a{color:inherit;text-decoration:none}
  button{font:inherit;background:none;border:none;cursor:pointer;color:inherit}
  :focus-visible{outline:2px solid var(--key);outline-offset:3px}
  section{scroll-margin-top:16px}
  .wrap{max-width:1120px;margin:0 auto;padding:0 clamp(20px,5vw,48px)}

  .rv{opacity:0;transform:translateY(16px);transition:opacity .7s ease,transform .7s ease}
  .rv.in{opacity:1;transform:none}
  @media (prefers-reduced-motion:reduce){
    html{scroll-behavior:auto}
    .rv{opacity:1;transform:none;transition:none}
  }

  /* ── 마스트헤드 ── */
  .masthead{border-bottom:3px double var(--ink)}
  .mast-top{display:flex;justify-content:space-between;align-items:baseline;gap:12px;padding:13px 0 9px;border-bottom:1px solid var(--line);font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--gray)}
  .mast-top .key{color:var(--key)}
  .nameplate{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:12px;padding:20px 0 17px}
  .nameplate .nm{font-family:var(--serif);font-size:clamp(23px,4vw,32px);font-weight:700;letter-spacing:-.01em}
  .nameplate .nm span{font-weight:400;color:var(--gray);font-size:.62em;margin-left:10px;letter-spacing:.04em}
  .menu{display:flex;flex-wrap:wrap;gap:clamp(11px,2.4vw,26px);font-family:var(--mono);font-size:11px;letter-spacing:.1em;color:var(--gray)}
  .menu a{padding-bottom:2px;border-bottom:1px solid transparent;transition:color .25s,border-color .25s}
  .menu a:hover{color:var(--key);border-color:var(--key)}

  /* ── 섹션 공통 ── */
  .sec-divider{display:flex;align-items:center;gap:14px;padding:clamp(52px,8vw,92px) 0 clamp(22px,3.5vw,34px)}
  .sec-divider::before,.sec-divider::after{content:"";height:1px;background:var(--line);flex:1}
  .sec-divider span{font-family:var(--mono);font-size:10px;letter-spacing:.24em;color:var(--gray);text-align:center}
  .sec-head{display:flex;justify-content:space-between;align-items:baseline;flex-wrap:wrap;gap:8px;margin-bottom:clamp(26px,4vw,44px)}
  .sec-head h2{font-family:var(--serif);font-size:clamp(21px,3.2vw,30px);font-weight:600;letter-spacing:-.01em}
  .sec-head .sub{font-family:var(--mono);font-size:10px;letter-spacing:.16em;color:var(--key)}
  .spread{background:var(--dk);color:var(--dk-text)}
  .spread .sec-divider::before,.spread .sec-divider::after{background:var(--dk-line)}
  .spread .sec-divider span{color:var(--dk-mut)}
  .spread .sec-head .sub{color:var(--key-lt)}

  /* ── 히어로 ── */
  .hero{padding:clamp(56px,9vw,108px) 0 clamp(48px,7vw,88px)}
  .kicker{font-family:var(--mono);font-size:clamp(9.5px,1.3vw,11px);letter-spacing:.2em;color:var(--key);margin-bottom:clamp(26px,4.5vw,44px)}
  .h-line{display:flex;align-items:baseline;gap:clamp(10px,2vw,18px);margin-bottom:clamp(8px,1.5vw,14px)}
  .h-line .no{font-family:var(--mono);font-size:clamp(10px,1.3vw,12px);color:var(--gray);letter-spacing:.1em;min-width:24px}
  .h-line h1{font-family:var(--serif);font-size:clamp(26px,5.3vw,56px);font-weight:600;letter-spacing:-.015em;line-height:1.25}
  .h-line.l1 h1{font-weight:500;color:var(--ink2)}
  .h-line.l2{padding-left:clamp(20px,4vw,56px)}
  .h-line.l3{padding-left:clamp(40px,8vw,112px)}
  .h-line.l3 h1{font-weight:700}
  .h-line .dot{color:var(--key)}
  .byline{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:22px;margin-top:clamp(34px,5.5vw,58px);padding-top:22px;border-top:1px solid var(--line)}
  .byline p{font-size:clamp(12.5px,1.5vw,14px);font-weight:350;color:var(--gray2);line-height:1.9;max-width:520px}
  .chips{display:flex;gap:7px;flex-wrap:wrap}
  .chips span{font-family:var(--mono);font-size:10px;letter-spacing:.06em;padding:6px 11px;border:1px solid var(--line2);color:var(--gray2)}
  .figures{display:grid;grid-template-columns:repeat(3,1fr);gap:clamp(14px,3vw,28px) clamp(14px,3vw,28px);margin-top:clamp(36px,6vw,60px);border-top:2px solid var(--ink);padding-top:clamp(18px,3vw,28px)}
  .fig .v{font-family:var(--serif);font-size:clamp(23px,3.4vw,36px);font-weight:700;color:var(--key);letter-spacing:-.01em}
  .fig .l{font-size:clamp(12px,1.5vw,13.5px);font-weight:600;margin-top:7px}
  .fig .s{font-family:var(--mono);font-size:9.5px;letter-spacing:.08em;color:var(--gray);margin-top:5px}

  /* ── 핵심 역량 ── */
  .vals{padding-bottom:clamp(56px,8vw,92px)}
  .val{display:grid;grid-template-columns:minmax(220px,360px) 1fr;gap:clamp(20px,4vw,56px);padding:clamp(26px,4vw,40px) 0;border-top:1px solid var(--dk-line)}
  .val .no{font-family:var(--mono);font-size:11px;letter-spacing:.14em;color:var(--key-lt);margin-bottom:12px}
  .val h3{font-family:var(--serif);font-size:clamp(18px,2.6vw,24px);font-weight:600;line-height:1.45}
  .val .en{font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--dk-mut);margin-top:10px}
  .val .thesis{font-size:clamp(13px,1.6vw,14.5px);font-weight:350;line-height:1.95;color:#CBD2E2;align-self:center}

  /* ── 커리어: 차례 ── */
  .grp{font-family:var(--mono);font-size:10px;letter-spacing:.2em;color:var(--key);padding:clamp(22px,3.5vw,32px) 0 12px}
  .grp:first-child{padding-top:0}
  .index{border-top:2px solid var(--ink)}
  .idx-row{padding:clamp(20px,3.5vw,30px) 0;border-bottom:1px solid var(--line)}
  .idx-line{display:flex;align-items:baseline;gap:12px}
  .idx-line .co{font-family:var(--serif);font-size:clamp(17px,2.4vw,22px);font-weight:600}
  .idx-line .role{font-size:12px;color:var(--gray);white-space:nowrap}
  .idx-line .leader{flex:1;border-bottom:1px dotted var(--line2);transform:translateY(-4px);min-width:24px}
  .idx-line .period{font-family:var(--mono);font-size:clamp(10.5px,1.4vw,12px);color:var(--key);letter-spacing:.04em;white-space:nowrap}
  .idx-row .org{margin-top:9px;font-size:clamp(11.5px,1.4vw,12.5px);font-weight:350;color:var(--gray);line-height:1.7}
  .crows{margin-top:14px;border-top:1px solid var(--line)}
  .crow{display:grid;grid-template-columns:minmax(150px,210px) 1fr;gap:8px 22px;padding:10px 0;border-bottom:1px solid var(--line)}
  .crow:last-child{border-bottom:none}
  .crow .k{font-size:12.5px;font-weight:600;color:var(--ink2);line-height:1.6}
  .crow .v{font-size:12.5px;font-weight:350;color:var(--gray2);line-height:1.8}

  /* ── 케이스 스터디 ── */
  .sig{font-family:var(--mono);font-size:clamp(10px,1.3vw,11px);letter-spacing:.06em;color:var(--gray2);line-height:2.1;padding:clamp(14px,2.4vw,20px) 0;border-top:1px solid var(--line);border-bottom:1px solid var(--line);margin-bottom:clamp(26px,4vw,40px)}
  .sig b{color:var(--key);font-weight:500;letter-spacing:.14em;margin-right:14px}
  .case{border-top:2px solid var(--ink);padding:clamp(26px,4.5vw,42px) 0 clamp(30px,5vw,48px)}
  .case-top{display:flex;justify-content:space-between;align-items:baseline;gap:12px;margin-bottom:14px}
  .case-top .tag{font-family:var(--mono);font-size:10px;letter-spacing:.18em;color:var(--key)}
  .case-top .period{font-family:var(--mono);font-size:11px;color:var(--gray)}
  .case h3{font-family:var(--serif);font-size:clamp(19px,3vw,27px);font-weight:600;line-height:1.45;margin-bottom:16px}
  .case .lead{font-size:clamp(12.5px,1.55vw,14px);font-weight:350;color:var(--gray2);line-height:1.9;max-width:800px}
  .case-more{margin-top:18px;font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;color:var(--key);border:1px solid var(--line2);padding:9px 15px;transition:border-color .25s,background .25s}
  .case-more:hover{border-color:var(--key);background:var(--card)}
  .case-detail{display:none;margin-top:22px;border-top:1px solid var(--line)}
  .case.open .case-detail{display:block}
  .cd-row{display:grid;grid-template-columns:minmax(110px,150px) 1fr;gap:10px 24px;padding:14px 0;border-bottom:1px solid var(--line)}
  .cd-row .k{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;color:var(--gray);padding-top:3px}
  .cd-row .t{font-size:clamp(12px,1.5vw,13px);font-weight:350;color:var(--gray2);line-height:1.85}
  .outcome{margin-top:22px;background:var(--card);border-left:3px solid var(--key);padding:clamp(16px,2.6vw,24px)}
  .outcome .k{font-family:var(--mono);font-size:9.5px;letter-spacing:.18em;color:var(--key);margin-bottom:9px}
  .outcome .t{font-size:clamp(12.5px,1.55vw,13.5px);font-weight:400;color:var(--ink2);line-height:1.9}

  /* ── 에디토리얼 아카이브 ── */
  .filters{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:clamp(20px,3vw,28px)}
  .filters button{font-family:var(--mono);font-size:10px;letter-spacing:.08em;padding:7px 13px;border:1px solid var(--line2);color:var(--gray);transition:all .25s}
  .filters button:hover{border-color:var(--key);color:var(--key)}
  .filters button.on{background:var(--key);border-color:var(--key);color:#fff}
  .arts{display:grid;grid-template-columns:repeat(auto-fill,minmax(250px,1fr));gap:14px}
  .art{border:1px solid var(--line);background:var(--card);display:flex;flex-direction:column;transition:border-color .25s,transform .25s}
  .art:hover{border-color:var(--key);transform:translateY(-2px)}
  .art .strip{height:4px}
  .art .in{padding:18px 18px 16px;display:flex;flex-direction:column;flex:1}
  .art .meta{display:flex;justify-content:space-between;font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;color:var(--key);margin-bottom:11px}
  .art .meta .yr{color:var(--gray)}
  .art h4{font-family:var(--serif);font-size:16px;font-weight:600;line-height:1.5}
  .art .st{font-size:12px;font-weight:500;color:var(--ink2);margin-top:5px}
  .art .cm{font-size:11.5px;font-weight:350;color:var(--gray);line-height:1.7;margin-top:9px;flex:1}
  .art .foot{display:flex;justify-content:space-between;align-items:baseline;margin-top:14px;padding-top:11px;border-top:1px solid var(--line)}
  .art .src{font-family:var(--mono);font-size:9px;letter-spacing:.1em;color:var(--gray)}
  .art .read{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--key)}
  .art .read:hover{border-bottom:1px solid var(--key)}
  .folder-btn{display:inline-block;margin-top:clamp(20px,3vw,28px);font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;color:var(--key);border:1px solid var(--key);padding:11px 18px;transition:all .25s}
  .folder-btn:hover{background:var(--key);color:#fff}

  /* ── 리더십 ── */
  .leads{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding-bottom:clamp(56px,8vw,92px)}
  .lead-card{border:1px solid var(--dk-line);padding:clamp(18px,2.8vw,26px)}
  .lead-card .tag{font-family:var(--mono);font-size:9px;letter-spacing:.18em;color:var(--key-lt);margin-bottom:11px}
  .lead-card .lb{font-size:clamp(13.5px,1.7vw,15px);font-weight:600;line-height:1.55}
  .lead-card .ds{font-size:12px;font-weight:300;color:var(--dk-mut);line-height:1.8;margin-top:9px}

  /* ── AI 워크로그 ── */
  .log-head{display:flex;justify-content:space-between;align-items:flex-end;flex-wrap:wrap;gap:16px;margin-bottom:clamp(18px,3vw,26px)}
  .log-head h2{font-family:var(--serif);font-size:clamp(21px,3.2vw,30px);font-weight:600}
  .log-head .hd2{font-size:13px;font-weight:600;color:var(--key);margin-top:9px}
  .log-head .intro{font-size:clamp(12px,1.5vw,13.5px);font-weight:350;color:var(--gray2);line-height:1.85;margin-top:8px;max-width:560px}
  .stamp{font-family:var(--mono);font-size:10px;letter-spacing:.12em;color:var(--key);border:1px solid var(--key);padding:8px 13px;white-space:nowrap}
  .stack{border-top:1px solid var(--line);margin-bottom:clamp(22px,3.5vw,32px)}
  .srow{display:grid;grid-template-columns:minmax(140px,190px) minmax(180px,300px) 1fr;gap:8px 22px;padding:12px 0;border-bottom:1px solid var(--line)}
  .srow .a{font-size:12.5px;font-weight:600;color:var(--ink2)}
  .srow .t{font-family:var(--mono);font-size:10.5px;color:var(--key);line-height:1.7}
  .srow .d{font-size:12px;font-weight:350;color:var(--gray2);line-height:1.75}
  .feed-note{font-size:12px;font-weight:350;color:var(--gray);margin-bottom:16px}
  .logs{display:grid;gap:14px}
  .log-card{background:var(--card);border:1px solid var(--line);border-top:3px solid var(--key);padding:clamp(20px,3.5vw,32px)}
  .log-meta{display:flex;justify-content:space-between;gap:10px;font-family:var(--mono);font-size:10.5px;letter-spacing:.1em;color:var(--gray);margin-bottom:13px}
  .log-meta .no{color:var(--key)}
  .log-meta .no em{font-style:normal;color:var(--gray);letter-spacing:.06em}
  .log-card h4{font-family:var(--serif);font-size:clamp(17px,2.5vw,22px);font-weight:600;margin-bottom:10px}
  .log-card .sum{font-size:clamp(12.5px,1.5vw,13.5px);font-weight:350;color:var(--gray2);line-height:1.85;margin-bottom:16px}
  .points{border-top:1px solid var(--line);padding-top:15px;display:grid;gap:9px}
  .points div{display:flex;gap:10px;font-size:12.5px;color:var(--gray2);line-height:1.65}
  .points div::before{content:"";width:5px;height:5px;background:var(--key);margin-top:7px;flex:none}
  .log-foot{display:flex;justify-content:space-between;align-items:baseline;gap:10px;margin-top:16px}
  .log-tags{display:flex;gap:6px;flex-wrap:wrap}
  .log-tags span{font-family:var(--mono);font-size:9.5px;letter-spacing:.06em;padding:4px 9px;background:var(--bg2);color:var(--gray2)}
  .log-link{font-family:var(--mono);font-size:10px;letter-spacing:.1em;color:var(--key)}
  .log-link:hover{border-bottom:1px solid var(--key)}
  .more-btn{display:block;width:100%;margin-top:14px;font-family:var(--mono);font-size:10.5px;letter-spacing:.14em;color:var(--gray);border:1px dashed var(--line2);padding:14px;transition:all .25s}
  .more-btn:hover{color:var(--key);border-color:var(--key)}

  /* ── 컨택트 ── */
  .contact-in{max-width:720px;margin:0 auto;text-align:center;padding:clamp(56px,9vw,100px) 0 clamp(40px,6vw,64px)}
  .contact-in .kick{font-family:var(--mono);font-size:10px;letter-spacing:.24em;color:var(--key-lt);margin-bottom:16px}
  .contact-in h2{font-family:var(--serif);font-size:clamp(21px,3.2vw,30px);font-weight:600;margin-bottom:14px}
  .contact-in .msg{font-size:clamp(12.5px,1.5vw,14px);font-weight:300;color:var(--dk-mut);line-height:1.85;margin-bottom:clamp(30px,5vw,48px)}
  .cinfo{display:flex;justify-content:center;gap:clamp(22px,5vw,52px);flex-wrap:wrap}
  .cinfo .l{font-family:var(--mono);font-size:9.5px;letter-spacing:.14em;color:var(--dk-mut);margin-bottom:7px}
  .cinfo .v{font-size:clamp(13px,1.6vw,15px);font-weight:500}
  .colophon{margin-top:clamp(40px,6vw,64px);padding-top:22px;border-top:1px solid var(--dk-line);font-family:var(--mono);font-size:9.5px;letter-spacing:.1em;color:rgba(237,240,247,.35)}

  .site-foot{border-top:3px double var(--ink)}
  .site-foot .in{display:flex;justify-content:space-between;flex-wrap:wrap;gap:8px;padding:16px 0 40px;font-family:var(--mono);font-size:10px;letter-spacing:.14em;color:var(--gray)}

  .boot-error{display:none;max-width:720px;margin:60px auto;padding:24px;border:2px solid var(--key);background:var(--card);font-size:14px;line-height:1.8}
  .boot-error b{color:var(--key)}

  @media (max-width:760px){
    .val{grid-template-columns:1fr;gap:14px}
    .leads{grid-template-columns:1fr}
    .figures{grid-template-columns:repeat(2,1fr);gap:20px 14px}
    .idx-line{flex-wrap:wrap;gap:6px 12px}
    .idx-line .leader{display:none}
    .idx-line .period{width:100%;order:-1}
    .crow{grid-template-columns:1fr;gap:4px}
    .srow{grid-template-columns:1fr;gap:5px}
    .cd-row{grid-template-columns:1fr;gap:5px}
    .byline{flex-direction:column;align-items:flex-start}
  }
</style>
</head>

    { tag: "PROCESS STANDARD", label: "프로세스 표준화 & 플레이북", desc: "프로젝트가 개인에 의존하지 않도록 캠페인 운영 매뉴얼, 브랜드 가이드라인, 콘텐츠 제작 프로세스를 문서화. 실행 품질의 일관성 확보" },
  ],

  /* ── AI 워크로그 ──────────────────────────────────────────
     ★ 정기 업데이트 구역. 새 작업이 생기면 entries 맨 위에
       아래 형식으로 한 항목 추가하면 끝입니다.
       날짜는 "YYYY.MM" 형식. 최신순 정렬과 Last Updated 표기는 자동.

     { date: "2026.08",
       title: "작업 제목",
       summary: "무엇을 만들었는지 한두 문장.",
       points: ["핵심 성과 1", "핵심 성과 2", "핵심 성과 3"],
       tags: ["자동화", "콘텐츠"],
       link: "" },   ← 자료 링크 없으면 "" 그대로 */
  ailog: {
    heading: "AI 마케팅 오퍼레이션",
    intro: "도구로 쓰는 수준이 아니라, 팀의 운영 시스템으로 설계해 씁니다. 에디터의 품질 기준으로 결과물을 관리합니다.",
    feedNote: "AI를 실무에 통합해 만든 작업을 요약과 핵심만 남겨 기록합니다. 새 항목이 위로 쌓입니다.",
    stack: [
      { area: "에이전트 설계·운영", tools: "Claude 커스텀 에이전트/스킬 · Claude Code · Cursor", desc: "경영 보고 자동 생성, 디지털 사이니지 제작, 결재·정산 문서, 언론 클리핑, 멀티채널 콘텐츠 파이프라인을 실무에 적용" },
      { area: "생성형 콘텐츠", tools: "Midjourney · Runway · Kling", desc: "키비주얼·영상 시안 제작, 에디터 기준의 디렉션과 품질 관리" },
      { area: "리서치·문서", tools: "ChatGPT · Claude · Gemini · NotebookLM", desc: "시장 리서치, 문서 자동화, 데이터 정리" },
      { area: "웹·자동화", tools: "HTML/CSS/JS · React · Node.js", desc: "포트폴리오 사이트 2종 직접 구축·운영, 문서 자동화 파이프라인 제작" },
      { area: "디지털·데이터", tools: "Meta·Google Ads · GA · 네이버 광고 · 카카오비즈니스", desc: "광고 운용과 인사이트 리포팅, 채널 운영" },
    ],
    entries: [
      { date: "2026.07", title: "월간 경영 보고 자동 생성 체계",
        summary: "소셜 리스닝, 광고, CRM 데이터를 통합한 월간 성과 리포트를 AI 에이전트가 자동 작성하는 구조를 설계해 운영하고 있다.",
        points: ["데이터 취합부터 차트·인사이트 구성까지 한 흐름 처리", "매월 반복되던 보고 수작업을 시스템으로 전환", "에디터 기준의 검수 단계로 품질 관리"],
        tags: ["자동화", "리포트"], link: "" },
      { date: "2026.06", title: "디지털 사이니지(DID) 제작 자동화",
        summary: "프로모션 문구만 입력하면 브랜드 규격에 맞는 디지털 안내판이 완성되는 도구를 설계했다. 디자인 의뢰 없이 당일 제작과 게시가 가능하다.",
        points: ["제작 리드타임 단축", "브랜드 서체·레이아웃 규격 자동 적용", "시즌 프로모션 대응 속도 개선"],
        tags: ["디자인", "자동화"], link: "" },
      { date: "2026.06", title: "결재·정산 문서 자동화",
        summary: "매월 반복되는 결재와 정산 문서를 항목 입력만으로 완성하는 에이전트를 만들었다.",
        points: ["정해진 양식에 맞춘 문서 자동 완성", "반복 정산 업무의 실수 여지 축소", "월말 마감 리소스를 기획 업무로 전환"],
        tags: ["자동화", "운영"], link: "" },
      { date: "2026.05", title: "언론 모니터링·클리핑 자동화",
        summary: "브랜드와 업계 보도를 정기 수집·분류하고 브리프로 정리하는 모니터링 체계를 구축했다.",
        points: ["기사 수집·분류·태깅 자동 처리", "주간 브리프 형식으로 요약", "업계 트렌드 파악 주기 단축"],
        tags: ["자동화", "PR"], link: "" },
      { date: "2026.05", title: "멀티채널 프로모션 콘텐츠 파이프라인",
        summary: "프로모션 개요를 입력하면 기획, 채널별 카피, 시안까지 단계별로 만들어지는 제작 라인을 구축했다. 단계마다 검수를 거쳐 품질을 유지한다.",
        points: ["인스타그램·네이버·카카오 등 채널별 콘텐츠 일괄 제작", "기획부터 시안까지 제작 시간 단축", "톤앤매너 검수 단계 내장"],
        tags: ["콘텐츠", "자동화"], link: "" },
    ],
  },

  /* ── 컨택트 ───────────────────────────────────────────── */
  contact: {
    heading: "함께 이야기 나눠요",
    message: "브랜드의 다음 이야기를 함께 만들어갈 기회를 찾고 있습니다.",
    info: [
      { label: "NAME", value: "문수진 Jay Moon" },
      { label: "EMAIL", value: "ver*****@naver.com" },
      { label: "PHONE", value: "010-****-9367" },
    ],
    colophon: "Built with Claude AI · Designed & Directed by Jay Moon · 2026",
  },
};

<!-- ════════ ▲ 콘텐츠 블록 끝 ▲ 아래는 레이아웃 코드: 수정 금지 ════════ -->

<header class="masthead" id="intro">
  <div class="wrap">
    <div class="mast-top"><span>PORTFOLIO · <span class="key" id="mVol"></span></span><span id="mSince"></span></div>
    <div class="nameplate">
      <div class="nm">문수진<span>Jay Moon</span></div>
      <nav class="menu">
        <a href="#intro">INTRO</a><a href="#career">CAREER</a><a href="#projects">PROJECTS</a><a href="#ailog">AI LOG</a><a href="#contact">CONTACT</a>
      </nav>
    </div>
  </div>
</header>

<section class="hero">
  <div class="wrap">
    <div class="kicker rv" id="hKicker"></div>
    <div id="hLines"></div>
    <div class="byline rv">
      <p id="hSub"></p>
      <div class="chips" id="hChips"></div>
    </div>
    <div class="figures rv" id="hFigs"></div>
  </div>
</section>

<section class="spread">
  <div class="wrap">
    <div class="sec-divider"><span>CORE COMPETENCIES</span></div>
    <div class="sec-head rv"><h2>핵심 역량</h2><span class="sub">CONTENT · EXPERIENCE · REVENUE · TEAM · AI</span></div>
    <div class="vals" id="vals"></div>
  </div>
</section>

<section id="career">
  <div class="wrap">
    <div class="sec-divider"><span>CAREER TIMELINE</span></div>
    <div class="sec-head rv"><h2>경력사항</h2><span class="sub">2009 — PRESENT</span></div>
    <div id="career-list"></div>
  </div>
</section>

<section id="projects">
  <div class="wrap">
    <div class="sec-divider"><span>FEATURED PROJECTS</span></div>
    <div class="sec-head rv"><h2>프로젝트</h2><span class="sub" id="caseCount"></span></div>
    <div class="sig rv" id="sig"></div>
    <div id="cases"></div>
  </div>
</section>

<section id="archive">
  <div class="wrap">
    <div class="sec-divider"><span>EDITORIAL ARCHIVE</span></div>
    <div class="sec-head rv"><h2>에디토리얼 아카이브</h2><span class="sub">FIELD NOTES · BEYOND &amp; MORE</span></div>
    <div class="filters rv" id="artFilters"></div>
    <div class="arts" id="arts"></div>
    <a class="folder-btn rv" id="folderBtn" target="_blank" rel="noopener">전체 아카이브 폴더 ↗</a>
  </div>
</section>

<section class="spread" id="leadership">
  <div class="wrap">
    <div class="sec-divider"><span>LEADERSHIP</span></div>
    <div class="sec-head rv"><h2>리더십</h2><span class="sub">TEAM · BUDGET · PROCESS</span></div>
    <div class="leads" id="leads"></div>
  </div>
</section>

<section id="ailog">
  <div class="wrap">
    <div class="sec-divider"><span>AI WORK LOG — LIVE FEED</span></div>
    <div class="log-head rv">
      <div>
        <h2>AI Work Log</h2>
        <div class="hd2" id="logHd"></div>
        <p class="intro" id="logIntro"></p>
      </div>
      <div class="stamp" id="stamp"></div>
    </div>
    <div class="stack rv" id="stack"></div>
    <p class="feed-note rv" id="feedNote"></p>
    <div class="filters rv" id="logFilters"></div>
    <div class="logs" id="logs"></div>
    <button class="more-btn" id="moreBtn" hidden></button>
  </div>
</section>

<section class="spread" id="contact">
  <div class="wrap contact-in">
    <div class="kick rv">CONTACT</div>
    <h2 class="rv" id="cHead"></h2>
    <p class="msg rv" id="cMsg"></p>
    <div class="cinfo rv" id="cInfo"></div>
    <div class="colophon" id="colophon"></div>
  </div>
</section>

<footer class="site-foot">
  <div class="wrap in"><span>MOON SOOJIN © 2026</span><span id="fVol"></span></div>
</footer>

<script>
(function(){
  if (typeof CONTENT === "undefined") {
    document.getElementById("bootError").style.display = "block";
    return;
  }
  const $ = (id) => document.getElementById(id);
  const br = (s) => String(s).replace(/\n/g, "<br>");

  /* ── 마스트헤드 · 푸터 ── */
  $("mVol").textContent = CONTENT.site.volume;
  $("mSince").textContent = CONTENT.site.since;
  $("fVol").textContent = CONTENT.site.volume + " · MARKETING DIRECTOR";
  document.title = CONTENT.site.title;

  /* ── 히어로 ── */
  $("hKicker").textContent = CONTENT.hero.kicker;
  $("hLines").innerHTML = CONTENT.hero.lines.map((t, i) => {
    const last = i === CONTENT.hero.lines.length - 1;
    return '<div class="h-line l' + (i + 1) + ' rv"><span class="no">0' + (i + 1) + '</span><h1>' + t + (last ? '<span class="dot">.</span>' : "") + "</h1></div>";
  }).join("");
  $("hSub").innerHTML = br(CONTENT.hero.sub);
  $("hChips").innerHTML = CONTENT.hero.chips.map((c) => "<span>" + c + "</span>").join("");
  $("hFigs").innerHTML = CONTENT.stats.map((s) =>
    '<div class="fig"><div class="v">' + s.value + '</div><div class="l">' + s.label + '</div><div class="s">' + s.sub + "</div></div>"
  ).join("");

  /* ── 핵심 역량 ── */
  $("vals").innerHTML = CONTENT.values.map((v) =>
    '<div class="val rv"><div><div class="no">' + v.num + '</div><h3>' + v.title + '</h3><div class="en">' + v.titleEn + '</div></div>' +
    '<p class="thesis">' + v.thesis + "</p></div>"
  ).join("");

  /* ── 커리어: 그룹 + 상세 ── */
  $("career-list").innerHTML = CONTENT.career.groups.map((g) =>
    '<div class="grp rv">' + g.label + '</div><div class="index">' +
    g.items.map((c) =>
      '<div class="idx-row rv"><div class="idx-line"><span class="co">' + c.company + '</span><span class="role">' + c.role + '</span><span class="leader"></span><span class="period">' + c.period + (c.duration ? " · " + c.duration : "") + "</span></div>" +
      (c.org ? '<p class="org">' + c.org + "</p>" : "") +
      (c.details && c.details.length ? '<div class="crows">' + c.details.map((d) => '<div class="crow"><div class="k">' + d.k + '</div><div class="v">' + d.v + "</div></div>").join("") + "</div>" : "") +
      "</div>"
    ).join("") + "</div>"
  ).join("");

  /* ── 케이스 스터디 ── */
  $("caseCount").textContent = "CASE STUDIES · " + CONTENT.cases.length;
  $("sig").innerHTML = "<b>SIGNATURE</b>" + CONTENT.signature.join(" · ");
  $("cases").innerHTML = CONTENT.cases.map((cs, i) =>
    '<article class="case rv" id="case' + i + '">' +
    '<div class="case-top"><span class="tag">' + cs.tag + '</span><span class="period">' + cs.period + "</span></div>" +
    "<h3>" + br(cs.title) + "</h3>" +
    '<p class="lead">' + cs.challenge + "</p>" +
    '<button class="case-more" data-i="' + i + '" aria-expanded="false">과정 펼치기 +</button>' +
    '<div class="case-detail">' +
    (cs.before ? '<div class="cd-row"><div class="k">BEFORE</div><div class="t">' + cs.before + "</div></div>" : "") +
    '<div class="cd-row"><div class="k">STRATEGY</div><div class="t">' + cs.strategy + "</div></div>" +
    '<div class="cd-row"><div class="k">EXECUTION</div><div class="t">' + cs.execution + "</div></div>" +
    "</div>" +
    '<div class="outcome"><div class="k">OUTCOME — 성과</div><div class="t">' + cs.outcome + "</div></div>" +
    "</article>"
  ).join("");
  document.querySelectorAll(".case-more").forEach((btn) => {
    btn.addEventListener("click", () => {
      const el = $("case" + btn.dataset.i);
      const open = el.classList.toggle("open");
      btn.textContent = open ? "과정 접기 –" : "과정 펼치기 +";
      btn.setAttribute("aria-expanded", open);
    });
  });

  /* ── 에디토리얼 아카이브 ── */
  const E = CONTENT.editorial;
  $("folderBtn").href = E.folder;
  const renderArts = (cat) => {
    const list = cat === "all" ? E.articles : E.articles.filter((a) => a.category === cat);
    $("arts").innerHTML = list.map((a) =>
      '<div class="art"><div class="strip" style="background:' + a.gradient + '"></div><div class="in">' +
      '<div class="meta"><span>' + (E.categories.find((c) => c.id === a.category) || { label: a.category }).label + '</span><span class="yr">' + a.year + "</span></div>" +
      "<h4>" + a.title + '</h4><div class="st">' + a.subtitle + '</div><div class="cm">' + a.commentary + "</div>" +
      '<div class="foot"><span class="src">' + a.source + '</span><a class="read" href="' + a.link + '" target="_blank" rel="noopener">READ ↗</a></div>' +
      "</div></div>"
    ).join("");
  };
  $("artFilters").innerHTML = '<button data-c="all" class="on">전체 ' + E.articles.length + "</button>" +
    E.categories.map((c) => '<button data-c="' + c.id + '">' + c.label + "</button>").join("");
  $("artFilters").querySelectorAll("button").forEach((b) => {
    b.addEventListener("click", () => {
      $("artFilters").querySelectorAll("button").forEach((x) => x.classList.remove("on"));
      b.classList.add("on");
      renderArts(b.dataset.c);
    });
  });
  renderArts("all");

  /* ── 리더십 ── */
  $("leads").innerHTML = CONTENT.leadership.map((l) =>
    '<div class="lead-card rv"><div class="tag">' + l.tag + '</div><div class="lb">' + l.label + '</div><div class="ds">' + l.desc + "</div></div>"
  ).join("");

  /* ── AI 워크로그 ── */
  const A = CONTENT.ailog;
  $("logHd").textContent = A.heading;
  $("logIntro").textContent = A.intro;
  $("feedNote").textContent = A.feedNote;
  $("stack").innerHTML = A.stack.map((s) =>
    '<div class="srow"><div class="a">' + s.area + '</div><div class="t">' + s.tools + '</div><div class="d">' + s.desc + "</div></div>"
  ).join("");

  const entries = A.entries.slice().sort((a, b) => (a.date < b.date ? 1 : -1));
  const total = entries.length;
  $("stamp").textContent = total ? "LAST UPDATED · " + entries[0].date : "COMING SOON";

  let logTag = "all";
  let shown = 4;
  const logCard = (e) => {
    const no = String(total - entries.indexOf(e)).padStart(3, "0");
    return '<div class="log-card rv in"><div class="log-meta"><span class="no">LOG. ' + no + (e.sample ? " <em>— 샘플 항목</em>" : "") + '</span><span>' + e.date + "</span></div>" +
      "<h4>" + e.title + '</h4><p class="sum">' + e.summary + "</p>" +
      '<div class="points">' + e.points.map((p) => "<div>" + p + "</div>").join("") + "</div>" +
      '<div class="log-foot"><div class="log-tags">' + (e.tags || []).map((t) => "<span>" + t + "</span>").join("") + "</div>" +
      (e.link ? '<a class="log-link" href="' + e.link + '" target="_blank" rel="noopener">자료 보기 ↗</a>' : "") + "</div></div>";
  };
  const renderLogs = () => {
    const list = logTag === "all" ? entries : entries.filter((e) => (e.tags || []).includes(logTag));
    $("logs").innerHTML = list.slice(0, shown).map(logCard).join("");
    const rest = list.length - shown;
    $("moreBtn").hidden = rest <= 0;
    $("moreBtn").textContent = "이전 로그 더 보기 + " + Math.max(rest, 0);
  };
  const allTags = [...new Set(entries.flatMap((e) => e.tags || []))];
  $("logFilters").innerHTML = '<button data-t="all" class="on">전체</button>' +
    allTags.map((t) => '<button data-t="' + t + '">' + t + "</button>").join("");
  $("logFilters").querySelectorAll("button").forEach((b) => {
    b.addEventListener("click", () => {
      $("logFilters").querySelectorAll("button").forEach((x) => x.classList.remove("on"));
      b.classList.add("on");
      logTag = b.dataset.t;
      shown = 4;
      renderLogs();
    });
  });
  $("moreBtn").addEventListener("click", () => { shown += 4; renderLogs(); });
  renderLogs();

  /* ── 컨택트 ── */
  $("cHead").textContent = CONTENT.contact.heading;
  $("cMsg").textContent = CONTENT.contact.message;
  $("cInfo").innerHTML = CONTENT.contact.info.map((c) =>
    '<div><div class="l">' + c.label + '</div><div class="v">' + c.value + "</div></div>"
  ).join("");
  $("colophon").textContent = CONTENT.contact.colophon;

  /* ── 스크롤 리빌 ── */
  const reveal = document.querySelectorAll(".rv");
  if ("IntersectionObserver" in window) {
    const io = new IntersectionObserver((es) => {
      es.forEach((e) => { if (e.isIntersecting) { e.target.classList.add("in"); io.unobserve(e.target); } });
    }, { threshold: 0.08 });
    reveal.forEach((el) => io.observe(el));
  } else {
    reveal.forEach((el) => el.classList.add("in"));
  }
})();
</script>
</body>
</html>
