                    <span style={{ fontFamily:F.body,fontSize:12,fontWeight:300,color:C.midGray }}>{tool.useCase}</span>
                  </div>
                )}
              </div>
            );
          })}
        </div>
      </div>
    </section>
  );
}

/* ═══════════════ APP ═══════════════ */
function App() {
  const mob = useIsMobile();
  const [as, setAs] = useState("hero");
  useEffect(() => {
    const secs = ["hero","value","career","editorial","leadership","ai","contact"];
    const h = () => { for (let i = secs.length-1; i >= 0; i--) { const el = document.getElementById(secs[i]); if (el && el.getBoundingClientRect().top < window.innerHeight*0.4) { setAs(secs[i]); break; } } };
    window.addEventListener("scroll", h); return () => window.removeEventListener("scroll", h);
  }, []);
  return (
    <div>
      <NavBar activeSection={as} mob={mob} />
      <Hero mob={mob} />
      <ValueSection mob={mob} />
      <CareerSection mob={mob} />
      <Editorial mob={mob} />
      <Leadership mob={mob} />
      <AIPowered mob={mob} />
      <Contact mob={mob} />
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
