  const [flt, setFlt] = useState("all");
  const filtered = flt === "all" ? articles : articles.filter(a => a.category === flt);
  return (
    <section id="editorial" style={{ background:C.white,padding:`${sp(mob)} ${px(mob)}` }}>
      <div style={{ maxWidth:1200,margin:"0 auto" }}>
        <div ref={ref} style={{ marginBottom:mob?28:48,opacity:vis?1:0,transform:vis?"translateY(0)":"translateY(30px)",transition:"all 0.7s ease" }}>
          <div style={{ fontFamily:F.mono,fontSize:11,color:C.accent,letterSpacing:"0.15em",marginBottom:12 }}>EDITORIAL PORTFOLIO</div>
          <h2 style={{ fontFamily:F.body,fontSize:mob?22:28,fontWeight:600,color:C.dark,marginBottom:8 }}>에디터의 눈, 마케터의 해석</h2>
          <p style={{ fontFamily:F.body,fontSize:mob?12:14,fontWeight:300,color:C.darkGray,lineHeight:1.7 }}>대한항공 기내 매거진 비욘드 시니어 에디터로서 전 세계 호텔과 문화 공간을 취재한 기록.</p>
        </div>
        <div style={{ display:"flex",gap:8,marginBottom:mob?20:40,flexWrap:"wrap" }}>
          {[{id:"all",label:"All"},...categories].map(c => <button key={c.id} onClick={()=>setFlt(c.id)} style={{ padding:"6px 14px",border:`1px solid ${flt===c.id?C.charcoal:C.lightGray}`,borderRadius:2,background:flt===c.id?C.charcoal:"transparent",color:flt===c.id?"#fff":C.darkGray,fontFamily:F.mono,fontSize:10,cursor:"pointer",transition:"all 0.3s" }}>{c.label}</button>)}
        </div>
        <div style={{ display:"grid",gridTemplateColumns:mob?"1fr":"repeat(3, 1fr)",gap:mob?20:20 }}>
          {filtered.map((a,i) => { const [r,v] = useInView(0.1); const [hov,setHov] = useState(false); return (
            <div key={a.id} ref={r} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} onClick={()=>window.open(a.link||DRIVE_FOLDER,"_blank")} style={{ opacity:v?1:0,transform:v?"translateY(0)":"translateY(30px)",transition:`all 0.6s ease ${(i%3)*0.1}s`,cursor:"pointer" }}>
              <div style={{ height:mob?160:200,borderRadius:4,overflow:"hidden",marginBottom:14,position:"relative",transform:hov?"translateY(-4px)":"translateY(0)",boxShadow:hov?"0 12px 40px rgba(0,0,0,0.12)":"0 2px 12px rgba(0,0,0,0.04)",transition:"all 0.4s ease" }}>
                <div style={{ position:"absolute",inset:0,background:a.gradient }} />
                <div style={{ position:"absolute",top:12,right:12,opacity:hov?1:0,transition:"opacity 0.3s",fontFamily:F.mono,fontSize:10,color:"#fff",background:"rgba(212,160,32,0.7)",padding:"4px 12px",borderRadius:2,backdropFilter:"blur(4px)" }}>View Article →</div>
                <div style={{ position:"absolute",bottom:14,left:16,right:16 }}><div style={{ fontFamily:F.mono,fontSize:10,color:"rgba(255,255,255,0.6)",marginBottom:4 }}>{a.year} · Beyond</div><div style={{ fontFamily:F.body,fontSize:mob?14:16,fontWeight:600,color:"rgba(255,255,255,0.95)",lineHeight:1.3 }}>{a.title}</div></div>
              </div>
              <div style={{ fontFamily:F.body,fontSize:13,fontWeight:500,color:C.dark,marginBottom:4 }}>{a.subtitle}</div>
              <p style={{ fontFamily:F.body,fontSize:12,fontWeight:300,color:C.midGray,lineHeight:1.6 }}><span style={{ color:C.accent,fontWeight:500 }}>→</span> {a.commentary}</p>
            </div>
          ); })}
        </div>
      </div>
    </section>
  );
}

function App() {
  const mob = useIsMobile();
  const [as, setAs] = useState("hero");
  useEffect(() => {
    const secs = ["hero","impact","career-story","strategy","cases","ai","editorial","contact"];
    const h = () => { for (let i = secs.length-1; i >= 0; i--) { const el = document.getElementById(secs[i]); if (el && el.getBoundingClientRect().top < window.innerHeight*0.4) { setAs(secs[i]); break; } } };
    window.addEventListener("scroll", h); return () => window.removeEventListener("scroll", h);
  }, []);
  return (<div><NavBar activeSection={as} mob={mob} /><Hero mob={mob} /><Impact mob={mob} /><CareerStory mob={mob} /><BrandStrategy mob={mob} /><CaseStudies mob={mob} /><AIPowered mob={mob} /><Editorial mob={mob} /><Contact mob={mob} /></div>);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script></body></html>
